spring.application.name=procurement

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/

# MySQL Database Configuration
# Set DATABASE_URL, DATABASE_USERNAME, and DATABASE_PASSWORD environment variables
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/procurementdb?useSSL=false&serverTimezone=Asia/Kolkata&connectTimeout=30000&socketTimeout=30000}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Resolve Jackson formatting issues
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# CORS allowed origin
app.cors.allowed-origin=http://localhost:5173

# Logging Configuration
logging.level.root=INFO
logging.level.com.guvi.procurement=DEBUG
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.web=DEBUG