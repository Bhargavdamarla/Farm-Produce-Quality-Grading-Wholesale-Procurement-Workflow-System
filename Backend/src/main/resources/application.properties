spring.application.name=procurement

# Server Configuration
server.port=8080
server.address=0.0.0.0

# MySQL Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/procurementdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:admin123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Resolve Jackson formatting issues
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# CORS allowed origin
app.cors.allowed-origin=http://localhost:5173